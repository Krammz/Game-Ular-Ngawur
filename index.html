<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4-Samp - Full Script Cloud</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg,#f5f7fa,#c3cfe2); }

        header { background:#fff; display:flex; justify-content:space-between; padding:15px; }
        nav { display:flex; gap:10px; padding:10px; }

        .section { display:none; }
        .section.active { display:block; }

        .collection-item {
            background:#fff; padding:20px; margin:10px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<header>
<h1>🎮 S4-Samp Mod Center</h1>
<button onclick="location.reload()">🔄 Refresh</button>
</header>

<nav>
<a href="#" onclick="showSection('home')">🏠 Home</a>
<a href="#" onclick="showSection('koleksi')">📦 Koleksi</a>
<a href="#" onclick="showSection('upload')">➕ Upload</a>
</nav>

<main>

<section id="home" class="section active">
<h2>🚀 S4-Samp</h2>
<p>FULL SCRIPT + CLOUD SYNC 🔥</p>
</section>

<section id="koleksi" class="section">
<h2>📦 Koleksi</h2>

<button onclick="exportMods()">💾 Export</button>
<input type="file" id="importFile">

<div id="collectionList"></div>
</section>

<section id="upload" class="section">
<h2>➕ Upload</h2>

<form id="uploadForm">
<input id="namaMod" placeholder="Nama Mod" required><br><br>
<input id="versiMod" placeholder="Versi" required><br><br>
<input id="deskripsiMod" placeholder="Deskripsi"><br><br>
<input id="authorMod" placeholder="Author" required><br><br>
<select id="perangkatMod">
<option value="PC">PC</option>
<option value="Mobile">Mobile</option>
</select><br><br>
<input id="linkDownload" placeholder="Link" required><br><br>
<input type="file" id="uploadGambar"><br><br>

<button type="submit">Upload</button>
</form>

</section>

</main>

<!-- 🔥 SCRIPT FULL -->
<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAqMsqFjNwjeFGujxC1hITySbz4fq63L8",
  authDomain: "krammz.firebaseapp.com",
  projectId: "krammz",
  storageBucket: "krammz.firebasestorage.app",
  messagingSenderId: "7256294488",
  appId: "1:7256294488:web:4e18cadc3016a90e15f62d",
  measurementId: "G-TDZ0H3WN7C"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const cloudDB = getFirestore(app);

/* ================= INDEXEDDB (ASLI LO) ================= */
class S4ModDB {
    constructor() {
        this.db = null;
        this.init();
    }

    init() {
        const req = indexedDB.open('S4SampDB', 2);
        req.onupgradeneeded = (e) => {
            this.db = e.target.result;
            if (!this.db.objectStoreNames.contains('mods')) {
                this.db.createObjectStore('mods', { keyPath: 'id', autoIncrement: true });
            }
        };
        req.onsuccess = () => {
            this.db = req.result;
            this.loadAll();
        };
    }

    async save(mod) {
        return new Promise((resolve) => {
            const tx = this.db.transaction(['mods'], 'readwrite');
            const store = tx.objectStore('mods');
            mod.id = Date.now();
            store.put(mod);
            tx.oncomplete = () => resolve(mod);
        });
    }

    async loadAll() {
        return new Promise((resolve) => {
            const tx = this.db.transaction(['mods'], 'readonly');
            const store = tx.objectStore('mods');
            const req = store.getAll();
            req.onsuccess = () => {
                window.modsData = req.result.reverse();
                renderMods(window.modsData);
                resolve();
            };
        });
    }

    async delete(id) {
        const tx = this.db.transaction(['mods'], 'readwrite');
        tx.objectStore('mods').delete(id);
        this.loadAll();
    }
}

const db = new S4ModDB();

/* ================= RENDER ================= */
function renderMods(data) {
    const list = document.getElementById('collectionList');
    if (!data) return;

    list.innerHTML = '';
    data.forEach(mod => {
        list.innerHTML += `
        <div class="collection-item">
            <h3>${mod.namaMod}</h3>
            <p>${mod.deskripsiMod || ''}</p>
            <p>👤 ${mod.authorMod}</p>
            <a href="${mod.linkDownload}" target="_blank">Download</a>
        </div>
        `;
    });
}

/* ================= FIREBASE REALTIME ================= */
onSnapshot(collection(cloudDB, "mods"), (snap) => {
    const cloudData = [];
    snap.forEach(doc => cloudData.push(doc.data()));

    // gabung ke local
    cloudData.forEach(m => db.save(m));

    renderMods(cloudData);
});

/* ================= UPLOAD ================= */
document.getElementById('uploadForm').onsubmit = async (e) => {
    e.preventDefault();

    const formData = {
        namaMod: namaMod.value,
        versiMod: versiMod.value,
        deskripsiMod: deskripsiMod.value,
        authorMod: authorMod.value,
        perangkatMod: perangkatMod.value,
        linkDownload: linkDownload.value,
        time: Date.now()
    };

    // upload firebase
    await addDoc(collection(cloudDB,"mods"), formData);

    // simpan local
    await db.save(formData);

    alert("🔥 Upload sukses + realtime!");
    e.target.reset();
};

/* ================= EXPORT IMPORT ================= */
function exportMods() {
    const data = JSON.stringify(window.modsData || []);
    const blob = new Blob([data]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "mods.json";
    a.click();
}

function importMods(files) {
    const reader = new FileReader();
    reader.onload = async () => {
        const data = JSON.parse(reader.result);
        for (let m of data) await db.save(m);
        alert("Import sukses");
    };
    reader.readAsText(files[0]);
}

document.getElementById('importFile').onchange = (e)=>importMods(e.target.files);

/* ================= NAV ================= */
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
window.showSection = showSection;

</script>

</body>
</html>
