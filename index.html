<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S4-Samp Cloud Full</title>

<style>
/* === CSS ASLI LO (DIRINGKAS BIAR RAPI) === */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI';background:linear-gradient(135deg,#f5f7fa,#c3cfe2);}
header{background:#fff;padding:15px;display:flex;justify-content:space-between;}
nav{display:flex;gap:10px;padding:10px;}
.section{display:none;}
.section.active{display:block;}
.collection-item{background:#fff;padding:15px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<header>
<h1>🎮 S4-Samp Cloud</h1>
<button onclick="location.reload()">🔄 Refresh</button>
</header>

<nav>
<a href="#" onclick="showSection('home')">🏠 Home</a>
<a href="#" onclick="showSection('koleksi')">📦 Koleksi</a>
<a href="#" onclick="showSection('upload')">➕ Upload</a>
</nav>

<main>

<section id="home" class="section active">
<h2>🚀 S4-Samp Cloud Aktif</h2>
<p>Realtime + Offline Support 🔥</p>
</section>

<section id="koleksi" class="section">
<h2>📦 Koleksi Mod</h2>
<div id="collectionList"></div>
</section>

<section id="upload" class="section">
<h2>➕ Upload Mod</h2>

<form id="uploadForm">
<input id="namaMod" placeholder="Nama Mod" required><br><br>
<input id="versiMod" placeholder="Versi" required><br><br>
<input id="authorMod" placeholder="Author" required><br><br>
<input id="linkDownload" placeholder="Link Download" required><br><br>
<button type="submit">Upload</button>
</form>

</section>

</main>

<!-- 🔥 FIREBASE + SYSTEM -->
<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAqMsqFjNwjeFGujxC1hITySbz4fq63L8",
  authDomain: "krammz.firebaseapp.com",
  projectId: "krammz",
  storageBucket: "krammz.firebasestorage.app",
  messagingSenderId: "7256294488",
  appId: "1:7256294488:web:4e18cadc3016a90e15f62d",
  measurementId: "G-TDZ0H3WN7C"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

/* ================= INDEXEDDB (BACKUP) ================= */
class LocalDB {
constructor(){
this.db=null;
this.init();
}
init(){
const req=indexedDB.open("S4DB",1);
req.onupgradeneeded=e=>{
this.db=e.target.result;
this.db.createObjectStore("mods",{keyPath:"id"});
};
req.onsuccess=e=>{
this.db=e.target.result;
this.load();
};
}
save(mod){
const tx=this.db.transaction(["mods"],"readwrite");
tx.objectStore("mods").put(mod);
}
load(){
const tx=this.db.transaction(["mods"],"readonly");
const req=tx.objectStore("mods").getAll();
req.onsuccess=()=>{
window.localMods=req.result;
renderMods();
};
}
}

const localDB=new LocalDB();

/* ================= UI ================= */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
window.showSection=showSection;

const list=document.getElementById("collectionList");

/* ================= RENDER ================= */
function renderMods(data){
if(!data) return;
list.innerHTML="";
data.forEach(mod=>{
list.innerHTML+=`
<div class="collection-item">
<h3>${mod.namaMod}</h3>
<p>Versi: ${mod.versiMod}</p>
<p>Author: ${mod.authorMod}</p>
<a href="${mod.linkDownload}" target="_blank">⬇️ Download</a>
</div>
`;
});
}

/* ================= FIREBASE REALTIME ================= */
let cloudMods=[];

onSnapshot(collection(db,"mods"),snap=>{
cloudMods=[];
snap.forEach(doc=>{
cloudMods.push(doc.data());
});

// sync ke local backup
cloudMods.forEach(m=>localDB.save(m));

// render dari cloud
renderMods(cloudMods);
});

/* ================= UPLOAD ================= */
document.getElementById("uploadForm").onsubmit=async e=>{
e.preventDefault();

const mod={
namaMod:namaMod.value,
versiMod:versiMod.value,
authorMod:authorMod.value,
linkDownload:linkDownload.value,
time:Date.now()
};

// simpan ke firebase
await addDoc(collection(db,"mods"),mod);

// simpan ke local
localDB.save(mod);

alert("🔥 Upload sukses & realtime!");
e.target.reset();
};

/* ================= AUTO LOAD LOCAL ================= */
window.addEventListener("load",()=>{
if(window.localMods) renderMods(window.localMods);
});

</script>

</body>
</html>
