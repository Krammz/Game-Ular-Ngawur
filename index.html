<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Runner 3D</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-family:Arial;
}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// scene
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 50);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);

// ground
let groundGeo = new THREE.PlaneGeometry(10,100);
let groundMat = new THREE.MeshStandardMaterial({color:0x222222});
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// player
let playerGeo = new THREE.BoxGeometry(0.7,1,0.7);
let playerMat = new THREE.MeshStandardMaterial({color:0x00ffcc});
let player = new THREE.Mesh(playerGeo, playerMat);
player.position.y = 0.5;
scene.add(player);

// enemy (satpam)
let enemyGeo = new THREE.BoxGeometry(0.7,1,0.7);
let enemyMat = new THREE.MeshStandardMaterial({color:0xff0000});
let enemy = new THREE.Mesh(enemyGeo, enemyMat);
enemy.position.set(0,0.5,2);
scene.add(enemy);

// lanes
let lane = 0;
let laneX = [-2,0,2];

// jump
let velocityY = 0;
let gravity = -0.02;

// swipe detection
let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 50 && lane < 2) lane++;
    if(dx < -50 && lane > -2) lane--;
  } else {
    if(dy < -50 && player.position.y <= 0.51){
      velocityY = 0.35; // jump
    }
  }
});

// obstacles
let obstacles = [];

function createObstacle(z){
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshStandardMaterial({color:0xffff00});
  let obj = new THREE.Mesh(geo, mat);

  let l = Math.floor(Math.random()*3)-1;
  obj.position.set(laneX[l+1],0.5,z);
  scene.add(obj);
  obstacles.push(obj);
}

// camera
camera.position.set(0,3,6);

// score
let score = 0;

// game loop
function animate(){
  requestAnimationFrame(animate);

  // move forward illusion
  ground.position.z += 0.3;

  // player lane move smooth
  player.position.x += (laneX[lane+1] - player.position.x) * 0.2;

  // jump physics
  player.position.y += velocityY;
  velocityY += gravity;
  if(player.position.y < 0.5){
    player.position.y = 0.5;
    velocityY = 0;
  }

  // spawn obstacle
  if(Math.random() < 0.02){
    createObstacle(-50);
  }

  // move obstacles
  obstacles.forEach((o,i)=>{
    o.position.z += 0.3;

    // collision
    if(
      Math.abs(o.position.x - player.position.x) < 0.7 &&
      Math.abs(o.position.z - player.position.z) < 0.7 &&
      player.position.y < 1
    ){
      alert("GAME OVER");
      location.reload();
    }

    if(o.position.z > 5){
      scene.remove(o);
      obstacles.splice(i,1);
    }
  });

  // enemy follow
  enemy.position.z = player.position.z + 2;

  // score
  score++;
  document.getElementById("score").innerText = score;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
