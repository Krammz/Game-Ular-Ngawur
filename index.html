<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KrammzLuaa Anomaly Obfuscator</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#e2e8f0;
  font-family:Arial;
  overflow:hidden;
}

/* Canvas background */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* UI */
.container{
  position:relative;
  padding:20px;
}

textarea{
  width:100%;
  height:200px;
  background:#000;
  color:#22c55e;
  border:1px solid #1e293b;
  padding:10px;
  margin-bottom:10px;
}

button{
  padding:10px;
  margin-right:5px;
  background:#22c55e;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

h1{
  color:#38bdf8;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>KrammzLuaa Anomaly 🔮</h1>

<textarea id="input" placeholder="Paste Lua script..."></textarea>

<button onclick="obfuscate()">Obfuscate</button>
<button onclick="copyOut()">Copy</button>
<button onclick="download()">Download</button>

<textarea id="output"></textarea>
</div>

<script>
// ===== MATRIX EFFECT =====
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%^&*";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let i=0;i<columns;i++){
  drops[i]=1;
}

function draw(){
  ctx.fillStyle = "rgba(2,6,23,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#22c55e";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }

    drops[i]++;
  }
}

setInterval(draw,33);

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ===== OBFUSCATOR =====
function anomalyName(){
  const chars = ["𓂀","Ω","Ξ","λ","Ж","Ҡ","ψ","ζ","Δ","☠","✶","✦"];
  let name = "_";
  for(let i=0;i<6;i++){
    name += chars[Math.floor(Math.random()*chars.length)];
  }
  return name;
}

function glitchEncode(str){
  return str.split("").map(c=>"\\\\"+c.charCodeAt(0)).join("");
}

function splitCode(str){
  let parts=[];
  for(let i=0;i<str.length;i+=20){
    parts.push(str.slice(i,i+20));
  }
  return parts;
}

function obfuscate(){
  let code = document.getElementById("input").value;

  let map = {};
  code = code.replace(/\b(local\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g,
  (m,l,n)=>{
    if(["function","end","if","then","do","for","while"].includes(n)) return m;
    if(!map[n]) map[n]=anomalyName();
    return (l||"")+map[n];
  });

  let encoded = glitchEncode(code);
  let parts = splitCode(encoded);

  let varName = anomalyName();
  let build = parts.map(p=>`"${p}"`).join("..");

  let decoder = anomalyName();

  let final = `
-- KrammzLuaa Anomaly Mode

local ${varName} = ${build}

local function ${decoder}(s)
  local r=""
  for i=1,#s do
    local c=string.sub(s,i,i)
    if c=="\\\\" then
      local num=""
      i=i+1
      while string.match(string.sub(s,i,i),"%d") do
        num=num..string.sub(s,i,i)
        i=i+1
      end
      r=r..string.char(tonumber(num))
    end
  end
  return r
end

loadstring(${decoder}(${varName}))()
`;

  document.getElementById("output").value = final;
}

function copyOut(){
  let o=document.getElementById("output");
  o.select();
  document.execCommand("copy");
  alert("Copied!");
}

function download(){
  let text=document.getElementById("output").value;
  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="krammzluaa_anomaly.lua.txt";
  a.click();
}
</script>

</body>
</html>
