<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Hunter 3D</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#ui {
  position:absolute; top:10px; left:10px;
  color:white; font-family:sans-serif;
}
button {
  position:fixed;
  bottom:20px;
  width:60px; height:60px;
  font-size:20px;
  opacity:0.7;
}
#up { left:80px; bottom:90px; }
#down { left:80px; }
#left { left:20px; }
#right { left:140px; }
</style>
</head>
<body>

<div id="ui">Hit: 0 / 200</div>

<button id="up">↑</button>
<button id="down">↓</button>
<button id="left">←</button>
<button id="right">→</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ground
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// snake
let snake = [];
let dir = {x:0.2,z:0};

function createSegment(x,z){
  let geo = new THREE.SphereGeometry(0.4,16,16);
  let mat = new THREE.MeshStandardMaterial({color:0x00ff88});
  let m = new THREE.Mesh(geo,mat);
  m.position.set(x,0.4,z);
  scene.add(m);
  return m;
}

// init snake
for(let i=0;i<5;i++){
  snake.push(createSegment(-i,0));
}

// target (orang sederhana)
function createHuman(){
  let geo = new THREE.BoxGeometry(0.6,1.2,0.4);
  let mat = new THREE.MeshStandardMaterial({color:0xff4444});
  let human = new THREE.Mesh(geo,mat);
  human.position.set(
    Math.random()*20-10,
    0.6,
    Math.random()*20-10
  );
  scene.add(human);
  return human;
}

let human = createHuman();

let hit = 0;

// control (touch)
document.getElementById("up").onclick=()=>dir={x:0,z:-0.2};
document.getElementById("down").onclick=()=>dir={x:0,z:0.2};
document.getElementById("left").onclick=()=>dir={x:-0.2,z:0};
document.getElementById("right").onclick=()=>dir={x:0.2,z:0};

// movement
function updateSnake(){
  let head = snake[0];
  let newX = head.position.x + dir.x;
  let newZ = head.position.z + dir.z;

  let newHead = createSegment(newX,newZ);
  snake.unshift(newHead);

  let tail = snake.pop();
  scene.remove(tail);

  // collision with human
  if(newHead.position.distanceTo(human.position) < 0.8){
    hit++;
    document.getElementById("ui").innerText = "Hit: "+hit+" / 200";

    scene.remove(human);
    human = createHuman();

    // grow snake
    snake.push(createSegment(newX,newZ));
  }
}

// camera follow
function updateCamera(){
  let head = snake[0];
  camera.position.set(head.position.x+5,5,head.position.z+5);
  camera.lookAt(head.position);
}

function animate(){
  requestAnimationFrame(animate);
  updateSnake();
  updateCamera();
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
