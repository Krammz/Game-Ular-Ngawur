<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Loader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header dengan Menu Hamburger -->
    <header>
        <div class="header-content">
            <h1>Mod Loader</h1>
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <nav class="mobile-menu" id="mobileMenu">
            <a href="#" class="nav-link active" data-page="home">Home</a>
            <a href="#" class="nav-link" data-page="upload">Upload Mod</a>
            <a href="#" class="nav-link" data-page="collection">Koleksi Mod</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Home Page -->
        <section id="home" class="page active">
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-number" id="totalScripts">0</div>
                    <div class="stat-label">Total Scripts</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalModloader">0</div>
                    <div class="stat-label">Total Modloader</div>
                </div>
            </div>
            <div class="explore-button">
                <button id="exploreBtn">Jelajahi Koleksi</button>
            </div>
        </section>

        <!-- Upload Mod Page -->
        <section id="upload" class="page">
            <div class="upload-container">
                <h2>Upload Mod Lua</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".lua" style="display: none;">
                    <div class="upload-placeholder">
                        <p>Klik atau drag & drop file .lua</p>
                    </div>
                </div>
                <button id="uploadBtn" class="upload-button">Upload Mod</button>
                <p id="uploadStatus"></p>
            </div>
        </section>

        <!-- Koleksi Mod Page -->
        <section id="collection" class="page">
            <div class="collection-container">
                <h2>Koleksi Mod</h2>
                <div id="modsList" class="mods-grid">
                    <!-- Mods akan dimuat di sini -->
                </div>
            </div>
        </section>
    </main>

    <!-- Download Modal -->
    <div id="downloadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Download Mod</h3>
            <div id="modalContent"></div>
            <a id="downloadLink" class="download-btn" href="#" download>Download File</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
