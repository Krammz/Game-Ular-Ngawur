<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lua Obfuscator</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #020617;
      color: #22c55e;
      border: 1px solid #1e293b;
      padding: 10px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    h1 {
      color: #38bdf8;
    }
  </style>
</head>
<body>

<h1>Lua Obfuscator</h1>

<label>Input Lua Script:</label>
<textarea id="input"></textarea>

<button onclick="obfuscate()">Obfuscate</button>

<label>Output:</label>
<textarea id="output"></textarea>

<script>
function randomName(length = 8) {
  const chars = "abcdefghijklmnopqrstuvwxyz";
  let result = "_";
  for (let i = 0; i < length; i++) {
    result += chars[Math.floor(Math.random() * chars.length)];
  }
  return result;
}

function encodeString(str) {
  let encoded = "";
  for (let i = 0; i < str.length; i++) {
    encoded += "\\" + str.charCodeAt(i);
  }
  return `"${encoded}"`;
}

function obfuscate() {
  let code = document.getElementById("input").value;

  // Replace variable names (simple)
  let varMap = {};
  code = code.replace(/\b(local\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g, function(match, local, name) {
    if (!varMap[name] && name !== "function" && name !== "end" && name !== "if") {
      varMap[name] = randomName();
    }
    return (local || "") + (varMap[name] || name);
  });

  // Encode strings
  code = code.replace(/"(.*?)"/g, function(match, str) {
    return encodeString(str);
  });

  // Wrap code
  let finalCode = `
local function _d(s)
  local r=""
  for i=1,#s do
    r=r..string.char(string.byte(s,i))
  end
  return r
end

loadstring(${encodeString(code)})()
`;

  document.getElementById("output").value = finalCode;
}
</script>

</body>
</html>
