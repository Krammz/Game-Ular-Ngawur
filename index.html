<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KrammzLuaa Stable Obfuscator</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#e2e8f0;
  font-family:Arial;
  overflow:hidden;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
.container{padding:20px;}
textarea{
  width:100%;
  height:200px;
  background:#000;
  color:#22c55e;
  border:1px solid #1e293b;
  padding:10px;
  margin-bottom:10px;
}
button{
  padding:10px;
  margin-right:5px;
  background:#22c55e;
  border:none;
  cursor:pointer;
}
h1{color:#38bdf8;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>KrammzLuaa Stable 🔒</h1>

<textarea id="input" placeholder="Paste Lua script..."></textarea>

<button onclick="obfuscate()">Obfuscate</button>
<button onclick="copyOut()">Copy</button>
<button onclick="download()">Download</button>

<textarea id="output"></textarea>
</div>

<script>
// ===== MATRIX BG =====
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=14;
const cols=canvas.width/size;
const drops=[];

for(let i=0;i<cols;i++) drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(2,6,23,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#22c55e";
  ctx.font=size+"px monospace";

  for(let i=0;i<drops.length;i++){
    let t=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(t,i*size,drops[i]*size);

    if(drops[i]*size>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,33);

// ===== OBFUSCATOR =====
function rand(len=8){
  const c="abcdefghijklmnopqrstuvwxyz";
  let r="_";
  for(let i=0;i<len;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}

function obfuscate(){
  let code=document.getElementById("input").value;

  // Rename variable (safe)
  let map={};
  code=code.replace(/\b(local\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g,(m,l,n)=>{
    if(["function","end","if","then","do","for","while","print","string","table"].includes(n)) return m;
    if(!map[n]) map[n]=rand();
    return (l||"")+map[n];
  });

  // Convert ke byte array
  let bytes=[];
  for(let i=0;i<code.length;i++){
    bytes.push(code.charCodeAt(i));
  }

  let arr = bytes.join(",");

  let dataVar = rand();
  let func = rand();

  let final = `
-- KrammzLuaa Stable

local ${dataVar}={${arr}}

local function ${func}(t)
  local s=""
  for i=1,#t do
    s=s..string.char(t[i])
  end
  return s
end

loadstring(${func}(${dataVar}))()
`;

  document.getElementById("output").value=final;
}

function copyOut(){
  let o=document.getElementById("output");
  o.select();
  document.execCommand("copy");
  alert("Copied!");
}

function download(){
  let text=document.getElementById("output").value;
  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="krammzluaa_stable.lua.txt";
  a.click();
}
</script>

</body>
</html>
