<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4-Samp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: white; border-bottom: 1px solid #ddd; 
        }
        header h1 { color: #0056b3; font-weight: bold; font-size: 1.4rem; }
        header button { background: #0056b3; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        nav { 
            background: white; border-bottom: 1px solid #ddd; display: flex; gap: 20px; 
            padding: 12px 20px; font-size: 0.95rem; overflow-x: auto; 
        }
        nav a { 
            color: #333; text-decoration: none; padding: 8px 12px; border-radius: 5px; 
            white-space: nowrap; 
        }
        nav a.active, nav a:hover { background: #0056b3; color: white; }

        main { padding: 20px; }
        
        .hero { 
            background: linear-gradient(135deg, #0056b3, #007bff); color: white; 
            border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 20px; 
        }
        .hero h2 { font-size: 1.8rem; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; margin: 5px 0; }
        .hero small { display: block; margin: 15px 0; opacity: 0.9; }

        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .stat-box { 
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 150px; padding: 20px; text-align: center; 
        }
        .stat-box h3 { color: #0056b3; font-size: 2rem; margin: 0; }
        .stat-box p { margin: 5px 0 0 0; color: #666; font-weight: 500; }

        /* Upload Form */
        .upload-section { max-width: 600px; margin: 0 auto; }
        .upload-section h2 { 
            color: #0056b3; border-bottom: 3px solid #0056b3; padding-bottom: 10px; 
            margin-bottom: 20px; max-width: 250px; 
        }
        form { 
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            padding: 25px; 
        }
        label { display: block; margin: 15px 0 5px 0; font-weight: bold; color: #0056b3; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; 
            font-size: 1rem; transition: border-color 0.3s; 
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0056b3; }
        textarea { resize: vertical; min-height: 100px; }
        button[type="submit"] { 
            background: #0056b3; color: white; border: none; padding: 15px 30px; 
            font-size: 1.1rem; border-radius: 8px; cursor: pointer; width: 100%; 
            margin-top: 20px; 
        }

        /* Koleksi Mod */
        .koleksi-section h2 { 
            color: #0056b3; border-bottom: 3px solid #0056b3; padding-bottom: 10px; 
            margin-bottom: 20px; max-width: 300px; 
        }
        .collection-list { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; 
        }
        .collection-item { 
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            padding: 20px; transition: transform 0.3s, box-shadow 0.3s; 
        }
        .collection-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .collection-item h3 { color: #0056b3; margin-bottom: 10px; }
        .collection-item small.version { 
            background: #e3f2fd; color: #0056b3; padding: 4px 8px; border-radius: 20px; 
            font-size: 0.8rem; 
        }
        .collection-item img { 
            width: 100%; height: 200px; object-fit: cover; border-radius: 8px; 
            margin: 15px 0; 
        }
        .collection-item .download-btn { 
            width: 100%; background: #28a745; color: white; border: none; 
            padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; 
            margin-top: 10px; 
        }
        .collection-item .download-btn:hover { background: #218838; }

        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 S4-Samp</h1>
        <button>≡ Menu</button>
    </header>

    <nav>
        <a href="#" onclick="showSection('home')" class="active">🏠 Home</a>
        <a href="#" onclick="showSection('koleksi')">📦 Koleksi Mod</a>
        <a href="#" onclick="showSection('upload')">➕ Upload Mod</a>
    </nav>

    <main>
        <!-- HOME -->
        <section id="home" class="section active">
            <div class="hero">
                <h2>🎉 Selamat Datang di S4-Samp</h2>
                <p>Grup Komunitas Mod & Script SAMP Indonesia</p>
                <small>Share Script Sigma Samp atau lebih dikenal oleh S4</small>
                <button onclick="showSection('koleksi')" style="background: rgba(255,255,255,0.2); border: 2px solid white; padding: 12px 25px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; margin-top: 15px;">Jelajahi Koleksi</button>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="totalScript">0</h3>
                    <p>Total Script</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalModloader">0</h3>
                    <p>Total Modloader</p>
                </div>
            </div>
        </section>

        <!-- KOLEKSI MOD -->
        <section id="koleksi" class="section">
            <h2>📦 Koleksi Mod & Modloader</h2>
            <div class="collection-list" id="collectionList">
                <!-- Mod akan muncul di sini -->
            </div>
        </section>

        <!-- UPLOAD MOD -->
        <section id="upload" class="section">
            <div class="upload-section">
                <h2>➕ Upload Mod Anda</h2>
                <form id="uploadForm">
                    <label for="namaMod">📝 Nama Mod / Script</label>
                    <input type="text" id="namaMod" placeholder="Contoh: Auto Pilot" required>

                    <label for="versiMod">🔢 Versi Mod</label>
                    <input type="text" id="versiMod" placeholder="Contoh: 1.0" required>

                    <label for="deskripsiMod">📄 Deskripsi Mod (Fitur)</label>
                    <textarea id="deskripsiMod" placeholder="Jelaskan fitur mod..."></textarea>

                    <label for="aktivasiMod">⚙️ Aktivasi Mod</label>
                    <select id="aktivasiMod">
                        <option value="Auto Aktif">Auto Aktif</option>
                        <option value="Manual">Manual</option>
                    </select>

                    <label for="authorMod">👤 Author Mod</label>
                    <input type="text" id="authorMod" placeholder="Nama Anda" required>

                    <label for="perangkatMod">📱 Perangkat</label>
                    <select id="perangkatMod">
                        <option value="PC">PC</option>
                        <option value="Mobile">Mobile</option>
                    </select>

                    <label for="linkDownload">🔗 Link Download</label>
                    <input type="url" id="linkDownload" placeholder="https://mediafire.com/..." required>

                    <label for="uploadGambar">🖼️ Preview Gambar (Max 8MB)</label>
                    <input type="file" id="uploadGambar" accept="image/*">

                    <button type="submit">🚀 Kirim Mod</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        // SCRIPT LENGKAP - PASTI JALAN!
        let mods = JSON.parse(localStorage.getItem('s4mods')) || [];

        function saveMods() {
            localStorage.setItem('s4mods', JSON.stringify(mods));
        }

        function renderMods() {
            const collectionList = document.getElementById('collectionList');
            const totalScript = document.getElementById('totalScript');
            const totalModloader = document.getElementById('totalModloader');

            collectionList.innerHTML = '';

            let countScript = 0;
            let countModloader = 0;

            mods.forEach((mod, index) => {
                const item = document.createElement('div');
                item.className = 'collection-item';

                if (mod.perangkatMod === 'PC') countScript++;
                else countModloader++;

                item.innerHTML = `
                    <small class="version">${mod.versiMod}</small>
                    <h3>${mod.namaMod}</h3>
                    <p>${mod.deskripsiMod}</p>
                    <p><strong>👤 Author:</strong> ${mod.authorMod}</p>
                    ${mod.gambarPreview ? `<img src="${mod.gambarPreview}" alt="Preview">` : ''}
                    <p><strong>📱 Perangkat:</strong> ${mod.perangkatMod}</p>
                    <a href="${mod.linkDownload}" target="_blank" class="download-btn">⬇️ Download Mod</a>
                `;
                collectionList.appendChild(item);
            });

            totalScript.textContent = countScript;
            totalModloader.textContent = countModloader;
        }

        // Upload Form
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const namaMod = document.getElementById('namaMod').value;
            const versiMod = document.getElementById('versiMod').value;
            const deskripsiMod = document.getElementById('deskripsiMod').value;
            const aktivasiMod = document.getElementById('aktivasiMod').value;
            const authorMod = document.getElementById('authorMod').value;
            const perangkatMod = document.getElementById('perangkatMod').value;
            const linkDownload = document.getElementById('linkDownload').value;
            const fileInput = document.getElementById('uploadGambar');

            let gambarPreview = '';

            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    gambarPreview = e.target.result;
                    saveNewMod(gambarPreview);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveNewMod('');
            }

            function saveNewMod(gambar) {
                const newMod = {
                    namaMod, versiMod, deskripsiMod, aktivasiMod,
                    authorMod, perangkatMod, linkDownload, gambarPreview: gambar
                };

                mods.push(newMod);
                saveMods();
                renderMods();

                alert('✅ Mod berhasil di-upload dan muncul di koleksi!');
                this.reset();
                showSection('koleksi');
            }
        });

        // Navigasi
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');

            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');

            if (sectionId === 'koleksi') renderMods();
        }

        // Load awal
        renderMods();
    </script>
</body>
  </html>
