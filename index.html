<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KrammzLuaa Obfuscator</title>

<style>
body {
  background: #020617;
  color: #e2e8f0;
  font-family: Arial;
  padding: 20px;
}
textarea {
  width: 100%;
  height: 200px;
  background: #000;
  color: #22c55e;
  border: 1px solid #1e293b;
  padding: 10px;
  margin-bottom: 10px;
}
button {
  padding: 10px;
  margin-right: 5px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
h1 {
  color: #38bdf8;
}
</style>

</head>
<body>

<h1>KrammzLuaa Obfuscator 🔒</h1>

<textarea id="input" placeholder="Paste Lua script..."></textarea>

<button onclick="obfuscate()">Obfuscate</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadFile()">Download</button>

<textarea id="output" placeholder="Result..."></textarea>

<script>
function rand(len=10){
  const c="abcdefghijklmnopqrstuvwxyz";
  let r="_";
  for(let i=0;i<len;i++){
    r+=c[Math.floor(Math.random()*c.length)];
  }
  return r;
}

function encode(str){
  return str.split("").map(c=>c.charCodeAt(0)).join(",");
}

function obfuscate(){
  let code = document.getElementById("input").value;

  // Rename variables
  let map = {};
  code = code.replace(/\b(local\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g,
  (m,l,n)=>{
    if(["function","end","if","then","do","for","while"].includes(n)) return m;
    if(!map[n]) map[n]=rand();
    return (l||"")+map[n];
  });

  // Encode whole script
  let encoded = encode(code);

  // Dummy code
  let junk = `
local ${rand()}=${Math.floor(Math.random()*99999)}
if ${rand()}==${rand()} then
  print("fake")
end
`;

  // Final wrapper
  let final = `
-- KrammzLuaa Obfuscator

${junk}

local function _d(t)
  local s=""
  for i=1,#t do
    s=s..string.char(t[i])
  end
  return s
end

local data={${encoded}}

loadstring(_d(data))()
`;

  document.getElementById("output").value = final;
}

function copyOutput(){
  let out = document.getElementById("output");
  out.select();
  document.execCommand("copy");
  alert("Copied!");
}

function downloadFile(){
  let text = document.getElementById("output").value;
  let blob = new Blob([text], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "krammzluaa_obf.lua.txt";
  a.click();
}
</script>

</body>
</html>
